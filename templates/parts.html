{% extends "base.html" %}
{% block title %}부품관리{% endblock %}
{% block page_title %}부품관리{% endblock %}

{% block content %}
<div class="parts-layout">
  <!-- Left Tree Sidebar -->
  <aside class="parts-tree" id="parts-tree">
    <div class="tree-header">
      <span class="tree-title">부품 분류</span>
      <button class="btn btn-sm btn-secondary" id="btn-collapse-all" title="모두 접기">−</button>
    </div>
    <div class="tree-body" id="tree-body">
      <div class="loading"><div class="spinner"></div></div>
    </div>
  </aside>

  <!-- Right Content -->
  <div class="parts-content">
    <!-- Breadcrumb + Actions -->
    <div class="parts-topbar">
      <div class="parts-breadcrumb" id="parts-breadcrumb">전체 부품</div>
      <div style="display:flex;gap:8px;flex-wrap:wrap;align-items:center">
        <input type="text" id="parts-search" class="search-input" style="width:220px" placeholder="🔍 부품코드, 부품명, 증상 검색...">
        <button class="btn btn-secondary btn-sm" id="btn-seed-upload" title="시드 데이터 업로드">📥 데이터 가져오기</button>
        <button class="btn btn-primary btn-sm" id="btn-create-part">+ 부품 등록</button>
      </div>
    </div>

    <!-- Parts Table -->
    <div class="table-wrap" style="margin-top:0;flex-shrink:0">
      <table>
        <thead>
          <tr>
            <th>부품코드</th>
            <th>부품명</th>
            <th>증상</th>
            <th style="text-align:right">원가</th>
            <th style="text-align:right">로컬가</th>
            <th style="text-align:right">대학가</th>
            <th style="text-align:right">거래수</th>
          </tr>
        </thead>
        <tbody id="parts-tbody"></tbody>
      </table>
      <div id="parts-pagination" class="pagination">
        <span class="pagination-info"></span>
        <div class="pagination-controls"></div>
      </div>
    </div>

    <!-- Inline Detail Panel -->
    <div id="part-detail-inline" style="display:none"></div>
  </div>
</div>

<!-- Seed Upload Modal Body (hidden, injected into modal) -->
<input type="file" id="seed-file-input" accept=".json" style="display:none">

<style>
.parts-layout {
  display: grid;
  grid-template-columns: 260px 1fr;
  gap: 16px;
  height: calc(100vh - var(--header-height) - 48px);
  overflow: hidden;
}

.parts-tree {
  background: #fff;
  border-radius: var(--border-radius);
  box-shadow: var(--shadow);
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

.tree-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 12px 14px;
  border-bottom: 1px solid var(--color-gray-200);
  flex-shrink: 0;
}

.tree-title {
  font-size: 13px;
  font-weight: 600;
  color: var(--color-gray-700);
}

.tree-body {
  flex: 1;
  overflow-y: auto;
  padding: 8px 0;
}

.tree-company {
  margin-bottom: 2px;
}

.tree-company-header {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 7px 14px;
  cursor: pointer;
  user-select: none;
  font-size: 13px;
  font-weight: 600;
  color: var(--color-gray-700);
  border-radius: 0;
  transition: background 0.1s;
}

.tree-company-header:hover { background: var(--color-gray-50); }
.tree-company-header.active { color: var(--color-primary); background: var(--color-primary-light); }

.tree-toggle { font-size: 10px; color: var(--color-gray-400); width: 14px; flex-shrink: 0; }

.tree-count {
  margin-left: auto;
  font-size: 11px;
  background: var(--color-gray-200);
  color: var(--color-gray-500);
  border-radius: 10px;
  padding: 1px 7px;
  font-weight: 500;
}

.tree-count.has-deals { background: #fef9c3; color: #92400e; }

.tree-cats { display: none; }
.tree-cats.open { display: block; }

.tree-cat-header {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 6px 14px 6px 28px;
  cursor: pointer;
  user-select: none;
  font-size: 12.5px;
  color: var(--color-gray-600);
  transition: background 0.1s;
}

.tree-cat-header:hover { background: var(--color-gray-50); }
.tree-cat-header.active { color: var(--color-primary); background: var(--color-primary-light); }

.tree-models { display: none; }
.tree-models.open { display: block; }

.tree-model-item {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 5px 14px 5px 44px;
  cursor: pointer;
  font-size: 12px;
  color: var(--color-gray-500);
  transition: background 0.1s;
}

.tree-model-item:hover { background: var(--color-gray-50); color: var(--color-gray-700); }
.tree-model-item.active { color: var(--color-primary); background: var(--color-primary-light); font-weight: 600; }

.parts-content {
  display: flex;
  flex-direction: column;
  gap: 12px;
  overflow-y: auto;
  min-width: 0;
}

.parts-topbar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  background: #fff;
  padding: 12px 16px;
  border-radius: var(--border-radius);
  box-shadow: var(--shadow-sm);
  flex-wrap: wrap;
  gap: 8px;
  flex-shrink: 0;
}

.parts-breadcrumb {
  font-size: 13px;
  font-weight: 600;
  color: var(--color-gray-700);
}

.parts-content .table-wrap {
  flex-shrink: 0;
}

/* Inline detail panel */
.pip {
  background: #fff;
  border-radius: var(--border-radius);
  box-shadow: var(--shadow);
  overflow: hidden;
  animation: pipSlideUp .25s ease;
}

@keyframes pipSlideUp {
  from { opacity: 0; transform: translateY(10px); }
  to   { opacity: 1; transform: translateY(0); }
}

.pip-header {
  padding: 12px 16px;
  background: var(--color-gray-50);
  border-bottom: 1px solid var(--color-gray-200);
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  gap: 12px;
}

.pip-header h3 {
  font-size: 14px;
  font-weight: 700;
  color: var(--color-primary);
  margin-bottom: 2px;
}

.pip-header .pip-sub {
  font-size: 11px;
  color: var(--color-gray-500);
}

.pip-header .pip-actions {
  display: flex;
  gap: 6px;
  align-items: center;
  flex-shrink: 0;
}

.pip-symptom {
  padding: 10px 16px;
  background: #fffbeb;
  border-bottom: 1px solid #fde68a;
  font-size: 12px;
  color: #92400e;
  line-height: 1.5;
}

.pip-prices {
  display: grid;
  grid-template-columns: repeat(6, 1fr);
  gap: 8px;
  padding: 14px 16px;
  border-bottom: 1px solid var(--color-gray-200);
}

.pip-card {
  background: var(--color-gray-50);
  border-radius: 7px;
  padding: 10px 8px;
  text-align: center;
}

.pip-card label {
  font-size: 10px;
  color: var(--color-gray-500);
  display: block;
  margin-bottom: 3px;
  letter-spacing: .3px;
}

.pip-card .pv {
  font-size: 13px;
  font-weight: 700;
  color: var(--color-gray-800);
  font-variant-numeric: tabular-nums;
}

.pip-card .pv.blue { color: var(--color-primary); }
.pip-card .pv.amber { color: #d97706; }

.pip-deals {
  padding: 14px 16px;
}

.pip-deals-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 10px;
}

.pip-deals-header h4 {
  font-size: 12px;
  font-weight: 600;
  color: var(--color-gray-600);
}

table.pip-dt {
  width: 100%;
  border-collapse: collapse;
  font-size: 12px;
}

table.pip-dt thead th {
  text-align: left;
  padding: 6px 8px;
  border-bottom: 2px solid var(--color-primary);
  font-size: 11px;
  font-weight: 600;
  color: var(--color-gray-500);
  white-space: nowrap;
}

table.pip-dt thead th.r { text-align: right; }

table.pip-dt tbody td {
  padding: 7px 8px;
  border-bottom: 1px solid var(--color-gray-100);
  color: var(--color-gray-700);
}

table.pip-dt tbody td.r {
  text-align: right;
  font-variant-numeric: tabular-nums;
}

table.pip-dt tbody tr:hover { background: var(--color-gray-50); }

/* Detail panel overrides */
.part-detail-section { margin-bottom: 20px; }
.part-detail-section h4 {
  font-size: 12px;
  font-weight: 700;
  color: var(--color-gray-500);
  text-transform: uppercase;
  letter-spacing: 0.5px;
  margin-bottom: 10px;
}

.symptom-box {
  background: #fffbeb;
  border: 1px solid #fde68a;
  border-radius: 8px;
  padding: 12px 14px;
  font-size: 13px;
  color: #92400e;
  line-height: 1.6;
}

.price-cards {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 8px;
  margin-bottom: 8px;
}

.price-card {
  background: var(--color-gray-50);
  border-radius: 8px;
  padding: 10px 12px;
  text-align: center;
}

.price-card .pc-label {
  font-size: 11px;
  color: var(--color-gray-500);
  margin-bottom: 4px;
}

.price-card .pc-value {
  font-size: 14px;
  font-weight: 700;
  color: var(--color-gray-800);
}

.price-card.primary { background: var(--color-primary-light); }
.price-card.primary .pc-value { color: var(--color-primary); }

.deal-filter-row {
  display: flex;
  gap: 8px;
  margin-bottom: 10px;
  align-items: center;
}

.deal-filter-row input { max-width: 180px; }

@media (max-width: 900px) {
  .parts-layout {
    grid-template-columns: 1fr;
    height: auto;
  }
  .parts-tree {
    max-height: 300px;
  }
  .price-cards { grid-template-columns: repeat(2, 1fr); }
  .pip-prices { grid-template-columns: repeat(3, 1fr); }
}

@media (max-width: 600px) {
  .pip-prices { grid-template-columns: repeat(2, 1fr); }
}
</style>
{% endblock %}

{% block scripts %}
<script src="/static/js/parts.js"></script>
{% endblock %}
